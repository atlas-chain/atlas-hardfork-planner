name: Publish planner

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  validate:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt
          rustup component add clippy

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Build
        run: cargo build --release --locked

  publish-docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: validate

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: arkiv-network/arkiv-hardfork-planner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref_type == 'tag'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust with musl target
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add x86_64-unknown-linux-musl

      - name: Install musl tooling
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build linux-amd64 release binary
        run: cargo build --release --locked --target x86_64-unknown-linux-musl

      - name: Package release artifact
        id: package
        run: |
          tag="${GITHUB_REF_NAME}"
          name="arkiv-hardfork-planner-${tag}-linux-amd64"
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/arkiv-hardfork-planner dist/
          tar -C dist -cJf "${name}.tar.xz" arkiv-hardfork-planner
          sha256sum "${name}.tar.xz" > "${name}.tar.xz.sha256"
          echo "archive=${name}.tar.xz" >> "$GITHUB_OUTPUT"
          echo "checksum=${name}.tar.xz.sha256" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}
