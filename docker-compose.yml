services:
  protocol-schedule:
    build: .
    image: atlas-hardfork-planner
    container_name: atlas-hardfork-planner
    ports:
      - "28882:28882"
    environment:
      LISTEN_HOST: "0.0.0.0"
      LISTEN_PORT: "28882"
      HTML_TITLE: ${HTML_TITLE:-Atlas Hardfork Planner}
      SCHEDULE_PATH: /data/atlas-protocol-schedule.json
      CHAIN_ID: "42069"
      # Uncomment to observe the chain head and gate future entries by currentBlock:
      # RPC_URL: http://execution-node:8545
      # RPC_POLL_SECONDS: "10"
      # RPC_TIMEOUT_MS: "5000"
      # Protect the admin (fork planning) API. Leave unset to disable writes:
      ADMIN_BEARER_KEY: ${ADMIN_BEARER_KEY:-}
    volumes:
      - ./data:/data
    restart: unless-stopped
